<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Sign Up</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #6d28d9;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container { background: var(--input-bg); border: 1px solid var(--border); padding: 3rem; border-radius: 20px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
        .auth-container h2 { font-size: 2rem; margin-bottom: 0.5rem; text-align: center; }
        .auth-container p { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input { width: 100%; padding: 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; transition: border-color 0.3s; }
        .form-group input:focus { border-color: var(--accent); }
        
        .submit-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 1rem; }
        .submit-btn:hover { box-shadow: 0 0 15px rgba(109, 40, 217, 0.5); }
        
        .login-link { text-align: center; margin-top: 1.5rem; display: block; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .login-link span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create an account</h2>
        <p>Join NexusAI and supercharge your workflow.</p>
        
        <form onsubmit="event.preventDefault(); alert('Account creation requires a database connection (like Firebase).');">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Continue</button>
        </form>
        
        <a href="index.html" class="login-link">Already have an account? <span>Log in</span></a>
    </div>
</body>
</html>
